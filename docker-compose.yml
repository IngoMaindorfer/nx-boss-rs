services:
  nx-boss-rs:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:10447:10447"
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      - scans:/data
    environment:
      - RUST_LOG=nx_boss_rs=info
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "/wget", "-q", "--spider", "http://localhost:10447/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal

volumes:
  scans:

networks:
  internal:
    internal: true
