{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h2>{% if editing %}{{ t.job_edit_title }}{% else %}{{ t.job_new_title }}{% endif %}</h2>
</div>

<div class="card">
  {% if let Some(msg) = error %}
  <div class="alert-error">{{ msg }}</div>
  {% endif %}

  <form class="edit-form"
        {% if editing %}
        hx-post="/jobs/{{ job_id }}"
        {% else %}
        hx-post="/jobs"
        {% endif %}
        hx-push-url="true">

    <div class="field">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" value="{{ name }}" required>
    </div>

    <div class="field">
      <label for="color">{{ t.field_color }}</label>
      <input id="color" name="color" type="color" value="{{ color }}">
    </div>

    <div class="field">
      <label for="output_path">{{ t.field_output_path }}</label>
      <input id="output_path" name="output_path" type="text" value="{{ output_path }}" required
             placeholder="{{ t.placeholder_path }}">
    </div>

    <div class="field">
      <label for="consume_path">{{ t.field_consume_path }}</label>
      <input id="consume_path" name="consume_path" type="text" value="{{ consume_path }}"
             placeholder="{{ t.placeholder_consume }}">
    </div>

    <div class="field">
      <label for="resolution">{{ t.field_resolution }}</label>
      <select id="resolution" name="resolution">
        <option value="150"  {% if resolution == 150  %}selected{% endif %}>150 DPI</option>
        <option value="200"  {% if resolution == 200  %}selected{% endif %}>200 DPI</option>
        <option value="300"  {% if resolution == 300  %}selected{% endif %}>300 DPI</option>
        <option value="400"  {% if resolution == 400  %}selected{% endif %}>400 DPI</option>
        <option value="600"  {% if resolution == 600  %}selected{% endif %}>600 DPI</option>
      </select>
    </div>

    <div class="field">
      <label for="jpeg_quality">{{ t.field_jpeg_quality }}</label>
      <input id="jpeg_quality" name="jpeg_quality" type="number" min="50" max="100"
             value="{{ jpeg_quality }}">
    </div>

    <div class="field">
      <label for="pixel_format">{{ t.field_pixel_format }}</label>
      <select id="pixel_format" name="pixel_format">
        <option value="rgb24"  {% if pixel_format == "rgb24"  %}selected{% endif %}>{{ t.pf_rgb }}</option>
        <option value="gray8"  {% if pixel_format == "gray8"  %}selected{% endif %}>{{ t.pf_gray }}</option>
      </select>
    </div>

    <div class="field">
      <label for="source">{{ t.field_source }}</label>
      <select id="source" name="source">
        <option value="feeder"      {% if source == "feeder"      %}selected{% endif %}>{{ t.source_duplex }}</option>
        <option value="feederFront" {% if source == "feederFront" %}selected{% endif %}>{{ t.source_front }}</option>
        <option value="feederRear"  {% if source == "feederRear"  %}selected{% endif %}>{{ t.source_rear }}</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ t.btn_save }}</button>
      <a href="/jobs" class="btn btn-secondary">{{ t.btn_cancel }}</a>
    </div>
  </form>
</div>
{% endblock %}
